<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký - TicketRush</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-container": "#dad7ff",
                      "surface-tint": "#4d44e3",
                      "surface-dim": "#dcd8e5",
                      "surface": "#fcf8ff",
                      "secondary-fixed": "#6ffbbe",
                      "primary-container": "#4f46e5",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed": "#0f0069",
                      "on-tertiary-container": "#d4dbf5",
                      "error-container": "#ffdad6",
                      "secondary-container": "#6cf8bb",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#464555",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed": "#131b2e",
                      "on-surface": "#1b1b24",
                      "outline-variant": "#c7c4d8",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#f3effc",
                      "on-error": "#ffffff",
                      "tertiary-fixed": "#dae2fd",
                      "surface-container-highest": "#e4e1ee",
                      "on-secondary-fixed": "#002113",
                      "inverse-surface": "#302f39",
                      "inverse-primary": "#c3c0ff",
                      "surface-container-low": "#f5f2ff",
                      "on-secondary-container": "#00714d",
                      "secondary-fixed-dim": "#4edea3",
                      "primary-fixed": "#e2dfff",
                      "surface-container": "#f0ecf9",
                      "on-primary": "#ffffff",
                      "background": "#fcf8ff",
                      "secondary": "#006c49",
                      "tertiary": "#41485e",
                      "on-tertiary-fixed-variant": "#3f465c",
                      "outline": "#777587",
                      "surface-bright": "#fcf8ff",
                      "surface-container-high": "#eae6f4",
                      "on-primary-fixed-variant": "#3323cc",
                      "on-secondary-fixed-variant": "#005236",
                      "tertiary-container": "#586076",
                      "primary-fixed-dim": "#c3c0ff",
                      "tertiary-fixed-dim": "#bec6e0",
                      "primary": "#3525cd",
                      "on-background": "#1b1b24",
                      "surface-variant": "#e4e1ee"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "xl": "48px",
                      "unit": "4px",
                      "gutter": "24px",
                      "container-max": "1280px",
                      "sm": "8px",
                      "lg": "24px",
                      "md": "16px",
                      "xs": "4px"
              },
              "fontFamily": {
                      "tabular-nums": [
                              "Inter"
                      ],
                      "h2": [
                              "Inter"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "h1": [
                              "Inter"
                      ],
                      "h3": [

                      ],
                      "body-sm": [

                      ]
              },
              "fontSize": {
                      "tabular-nums": [

                      "label-caps": [

                      "body-md": [

                                      "fontWeight": "400"

                      ],
                      "h1": [

                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "h3": [
                              "24px",
                              {
                                      "lineHeight": "1.4",
                                      "letterSpacing": "0",

                      ],
                      "body-sm": [
                              "14px",
                              {
                                      "lineHeight": "1.5",

          },
        }
      </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md">
<main class="w-full max-w-[480px] bg-surface-container-lowest shadow-[0px_10px_30px_rgba(0,0,0,0.08)] border border-outline-variant rounded-xl overflow-hidden flex flex-col">
<!-- Header -->
<header class="pt-xl pb-lg px-xl text-center border-b border-surface-variant bg-surface-container-low">
<div class="mb-sm">
<span class="font-h1 text-h1 text-primary tracking-tighter">TicketRush</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface">Tạo tài khoản</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Tham gia để trải nghiệm mua vé nhanh chóng</p>
</header>
<!-- Form Container -->
<div class="p-xl bg-surface-container-lowest">
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Họ tên & Email -->
<div class="flex flex-col sm:flex-row gap-md">
<div class="flex-1">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="fullname">Họ và tên</label>
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT pl-[40px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="email@example.com" required="" type="email"/>
</div>
</div>
<!-- Số điện thoại -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="phone">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">call</span>
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT pl-[40px] pr-md py-sm font-tabular-nums text-tabular-nums text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="phone" name="phone" placeholder="0912 345 678" required="" type="tel"/>
</div>
</div>
<!-- Mật khẩu & Xác nhận -->
<div class="flex flex-col gap-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT pl-[40px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="confirm_password">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock_reset</span>
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT pl-[40px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Ngày sinh & Giới tính -->
<div class="flex flex-col sm:flex-row gap-md">
<div class="flex-1">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="dob">Ngày sinh</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-DEFAULT px-md py-sm font-tabular-nums text-tabular-nums text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="dob" name="dob" required="" type="date"/>
</div>
</div>
<div class="flex-1">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase" for="gender">Giới tính</label>
<select class="w-full bg-surface border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none" id="gender" name="gender" required="">
<option disabled="" selected="" value="">Chọn giới tính</option>
<option value="male">Nam</option>
<option value="female">Nữ</option>
<option value="other">Khác</option>
</select>
</div>
</div>
<!-- Điều khoản -->
<div class="flex items-start gap-sm mt-sm">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="text-sm leading-6">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            Tôi đồng ý với <a class="text-primary hover:underline font-medium" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:underline font-medium" href="#">Chính sách bảo mật</a> của TicketRush.
                        </label>
</div>
</div>
<!-- Nút CTA -->
<div class="mt-md">
<button class="w-full flex justify-center items-center gap-xs bg-primary text-on-primary font-body-md text-body-md font-bold px-lg py-[12px] rounded-DEFAULT hover:opacity-90 transition-opacity" type="submit">
<span>Tạo tài khoản</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer / Đăng nhập -->
<div class="px-xl py-lg bg-surface-container-low border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Đã có tài khoản? 
                <a class="text-primary font-semibold hover:underline decoration-primary underline-offset-4 transition-all" href="#">Đăng nhập ngay</a>
</p>
</div>
</main>
</body></html>
